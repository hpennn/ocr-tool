  <!-- Main Script -->
  <script>
    const chatArea = document.getElementById('chat-area');
    const messagesEl = document.getElementById('messages');
    const uploadArea = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');
    const langSelect = document.getElementById('lang-select');

    // ===== Message helpers =====
    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
      });
    }

    function createUserMessage(imageUrl) {
      const div = document.createElement('div');
      div.className = 'flex justify-end msg-appear';
      div.innerHTML = `
        <div class="max-w-[75%] sm:max-w-[60%]">
          <div class="bg-blue-600 rounded-2xl rounded-br-sm p-1 shadow-sm border border-blue-400/30">
            <img src="${imageUrl}" alt="上传的图片" class="max-h-48 rounded-xl object-contain" />
          </div>
          <p class="text-xs text-gray-400 text-right mt-1 pr-1">刚刚</p>
        </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function createTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-appear';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
          <div class="flex items-center gap-2">
            <div class="flex gap-1">
              <span class="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
              <span class="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
              <span class="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
            </div>
            <span class="text-sm text-gray-500" id="typing-status">正在识别中...</span>
          </div>
          <div class="mt-2 w-48 bg-gray-200 rounded-full h-1.5">
            <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
          </div>
          <p id="progress-status" class="text-xs text-gray-400 mt-1">准备中...</p>
        </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function formatText(text) {
      // Preserve line breaks, convert to <br>, handle multiple newlines as paragraph breaks
      let escaped = escapeHtml(text);
      // Convert double newlines to paragraph breaks
      escaped = escaped.replace(/\n{2,}/g, '<br><br>');
      // Convert single newlines to <br>
      escaped = escaped.replace(/\n/g, '<br>');
      return escaped;
    }

    function createResultMessage(text) {
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-appear';
      const formattedText = formatText(text);
      const copyId = 'copy-' + Date.now();
      div.innerHTML = `
        <div class="max-w-[85%] sm:max-w-[75%]">
          <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
            <p class="text-xs text-gray-400 mb-2">📝 识别结果</p>
            <div class="text-sm text-gray-800 leading-relaxed break-words whitespace-pre-wrap">${formattedText}</div>
            <div class="mt-3 pt-2 border-t border-gray-100 flex items-center gap-2 flex-wrap">
              <button onclick="copyResult(this, '${copyId}')" class="flex items-center gap-1 text-xs text-blue-600 hover:text-blue-800 cursor-pointer transition-colors">
                <svg width="14" height="14" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                复制
              </button>
              <span class="copy-toast text-xs text-green-600 hidden">已复制 ✓</span>
              <span class="text-gray-300">|</span>
              <div class="relative export-dropdown">
                <button onclick="toggleExportMenu(this)" class="flex items-center gap-1 text-xs text-blue-600 hover:text-blue-800 cursor-pointer transition-colors">
                  <svg width="14" height="14" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  保存文档
                  <svg width="12" height="12" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="export-menu hidden absolute bottom-full left-0 mb-1 bg-white border border-gray-200 rounded-lg shadow-lg py-1 z-50 min-w-[120px]">
                  <button onclick="exportText(this)" class="w-full text-left px-3 py-2 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700 cursor-pointer flex items-center gap-2">📄 纯文本 (.txt)</button>
                  <button onclick="exportMarkdown(this)" class="w-full text-left px-3 py-2 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700 cursor-pointer flex items-center gap-2">📝 Markdown (.md)</button>
                  <button onclick="exportPDF(this)" class="w-full text-left px-3 py-2 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700 cursor-pointer flex items-center gap-2">📕 PDF文档 (.pdf)</button>
                  <button onclick="exportWord(this)" class="w-full text-left px-3 py-2 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700 cursor-pointer flex items-center gap-2">📘 Word文档 (.doc)</button>
                </div>
              </div>
            </div>
          </div>
          <p class="text-xs text-gray-400 mt-1 pl-1">刚刚</p>
        </div>`;
      // Store raw text for copying
      div.dataset.rawText = text;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function createErrorMessage(msg) {
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-appear';
      div.innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm max-w-[80%]">
          <p class="text-sm text-red-600">❌ ${escapeHtml(msg)}</p>
        </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function addSystemTextMessage(text) {
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-appear';
      div.innerHTML = `
        <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm max-w-[85%] sm:max-w-[75%]">
          <p class="text-sm text-gray-700 leading-relaxed">${text}</p>
        </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    // ===== Copy function =====
    function copyResult(btn, id) {
      const msgDiv = btn.closest('[data-raw-text]');
      const text = msgDiv?.dataset?.rawText || '';
      const toast = btn.parentElement.querySelector('.copy-toast');
      if (!text) return;

      navigator.clipboard.writeText(text).then(() => {
        if (toast) {
          toast.classList.remove('hidden');
          setTimeout(() => toast.classList.add('hidden'), 2000);
        }
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        if (toast) {
          toast.classList.remove('hidden');
          setTimeout(() => toast.classList.add('hidden'), 2000);
        }
      });
    }

    // ===== OCR Processing =====
    async function processImage(file) {
      // Show user message with image
      const imageUrl = URL.createObjectURL(file);
      createUserMessage(imageUrl);

      // Show typing indicator
      const typingEl = createTypingIndicator();
      const progressBar = typingEl.querySelector('#progress-bar');
      const progressStatus = typingEl.querySelector('#progress-status');
      const typingStatus = typingEl.querySelector('#typing-status');

      const lang = langSelect.value;

      try {
        const result = await Tesseract.recognize(file, lang, {
          logger: (m) => {
            if (m.status === 'loading tesseract core') {
              progressStatus.textContent = '加载识别引擎...';
              typingStatus.textContent = '加载引擎中...';
            } else if (m.status === 'initializing tesseract') {
              progressStatus.textContent = '初始化引擎...';
            } else if (m.status === 'loading language traineddata') {
              progressStatus.textContent = '下载语言数据...';
              typingStatus.textContent = '下载数据中...';
            } else if (m.status === 'initializing api') {
              progressStatus.textContent = '准备识别...';
            } else if (m.status === 'recognizing text') {
              progressStatus.textContent = '正在识别文字...';
              typingStatus.textContent = '识别中...';
            }
            if (m.progress) {
              const pct = Math.round(m.progress * 100);
              progressBar.style.width = pct + '%';
            }
          },
        });

        // Remove typing indicator
        typingEl.remove();

        const text = result.data.text.trim();
        if (text) {
          createResultMessage(text);
        } else {
          createErrorMessage('未识别到文字内容，请尝试更清晰的图片。');
        }
      } catch (err) {
        console.error('OCR Error:', err);
        typingEl.remove();
        createErrorMessage('识别失败，请重试。' + (err.message ? ' (' + err.message + ')' : ''));
      }
    }

    // ===== File handling =====
    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) {
        createErrorMessage('请上传图片文件（JPG / PNG / BMP / WebP）。');
        return;
      }
      if (file.size > 20 * 1024 * 1024) {
        createErrorMessage('图片大小超过 20MB，请使用较小的图片。');
        return;
      }
      processImage(file);
      // Reset file input
      fileInput.value = '';
    }

    // ===== Event listeners =====
    // Click to upload
    uploadArea.addEventListener('click', (e) => {
      // Don't trigger if clicking on the select
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'OPTION') return;
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) handleFile(file);
    });

    // Drag and drop on entire body
    document.body.addEventListener('dragover', (e) => {
      e.preventDefault();
      document.body.classList.add('drag-over');
    });

    document.body.addEventListener('dragleave', (e) => {
      if (e.relatedTarget === null || !document.body.contains(e.relatedTarget)) {
        document.body.classList.remove('drag-over');
      }
    });

    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      document.body.classList.remove('drag-over');
      const file = e.dataTransfer?.files[0];
      if (file) handleFile(file);
    });

    // Paste
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) handleFile(file);
          break;
        }
      }
    });

    // ===== Export functions =====
    function getRawText(btn) {
      return btn.closest('[data-raw-text]')?.dataset?.rawText || '';
    }

    function getTimestamp() {
      const d = new Date();
      return d.getFullYear() + '' +
        String(d.getMonth()+1).padStart(2,'0') +
        String(d.getDate()).padStart(2,'0') + '_' +
        String(d.getHours()).padStart(2,'0') +
        String(d.getMinutes()).padStart(2,'0');
    }

    function toggleExportMenu(btn) {
      const menu = btn.nextElementSibling;
      const wasHidden = menu.classList.contains('hidden');
      document.querySelectorAll('.export-menu').forEach(m => m.classList.add('hidden'));
      if (wasHidden) menu.classList.remove('hidden');
    }

    function exportText(btn) {
      const text = getRawText(btn);
      if (!text) return;
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      saveAs(blob, 'OCR提取_' + getTimestamp() + '.txt');
      closeExportMenu(btn);
    }

    function exportMarkdown(btn) {
      const text = getRawText(btn);
      if (!text) return;
      const md = '# OCR 文字识别结果\n\n> 识别时间：' + new Date().toLocaleString('zh-CN') + '\n\n---\n\n' + text + '\n';
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
      saveAs(blob, 'OCR提取_' + getTimestamp() + '.md');
      closeExportMenu(btn);
    }

    function exportPDF(btn) {
      const text = getRawText(btn);
      if (!text) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 20;
      const maxWidth = pageWidth - margin * 2;
      const lineHeight = 7;
      let y = margin;

      doc.setFontSize(14);
      doc.setTextColor(30, 64, 175);
      doc.text('OCR Result', margin, y);
      y += 10;

      doc.setFontSize(8);
      doc.setTextColor(156, 163, 175);
      doc.text(new Date().toLocaleString('zh-CN'), margin, y);
      y += 8;

      doc.setDrawColor(229, 231, 235);
      doc.line(margin, y, pageWidth - margin, y);
      y += 8;

      doc.setFontSize(10);
      doc.setTextColor(31, 41, 55);

      const lines = doc.splitTextToSize(text, maxWidth);
      for (let i = 0; i < lines.length; i++) {
        if (y > pageHeight - margin) {
          doc.addPage();
          y = margin;
        }
        doc.text(lines[i], margin, y);
        y += lineHeight;
      }

      doc.save('OCR提取_' + getTimestamp() + '.pdf');
      closeExportMenu(btn);
    }

    function exportWord(btn) {
      const text = getRawText(btn);
      if (!text) return;
      const html = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://schemas.w3.org/TR/REC-html40">
        <head><meta charset="utf-8"><title>OCR提取结果</title>
        <style>body{font-family:SimSun,serif;font-size:12pt;line-height:1.8;padding:2.5cm;}h1{font-size:16pt;color:#1e40af;border-bottom:1px solid #e5e7eb;padding-bottom:8pt;}p{margin:0 0 6pt 0;text-align:justify;}.meta{font-size:9pt;color:#9ca3af;margin-bottom:12pt;}</style>
        </head><body>
        <h1>OCR 文字识别结果</h1>
        <p class="meta">识别时间：${new Date().toLocaleString('zh-CN')}</p>
        ${text.split('\n').map(line => line.trim() ? `<p>${escapeHtml(line)}</p>` : '').join('\n')}
        </body></html>`;
      const blob = new Blob(['\ufeff' + html], { type: 'application/msword;charset=utf-8' });
      saveAs(blob, 'OCR提取_' + getTimestamp() + '.doc');
      closeExportMenu(btn);
    }

    function closeExportMenu(btn) {
      const menu = btn.closest('.export-dropdown')?.querySelector('.export-menu');
      if (menu) menu.classList.add('hidden');
    }

    // Close export menu on outside click
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.export-dropdown')) {
        document.querySelectorAll('.export-menu').forEach(m => m.classList.add('hidden'));
      }
    });

    // ===== Welcome message =====
    (function init() {
      addSystemTextMessage('你好！我是图片文字提取助手 📷<br><br>上传一张图片，我来帮你提取文字。<br>支持 <strong>中英文</strong> 识别，识别后可导出 <strong>TXT / Markdown / PDF / Word</strong> 文档。<br>所有处理都在浏览器本地完成，保护隐私。');
    })();
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
<script>
(function(){
  let deferredPrompt;
  const installBtn = document.getElementById('pwa-install-btn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.style.display = 'flex';
  });
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    });
  }
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    if (installBtn) installBtn.style.display = 'none';
  }
})();
</script>
</body>
