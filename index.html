  <script type="application/ld+json">

    "@context": "https://schema.org",

    "applicationCategory": "UtilityApplication",
    "operatingSystem": "All",

  </script>

  <title>图片文字提取 - 免费在线OCR文字识别工具</title>

  <style>
    @keyframes typing {
      0%, 60% { opacity: 1; }
      30% { opacity: 0.3; }
      90%, 100% { opacity: 0; }
    }
    .typing-dot {
      animation: typing 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    .msg-appear {
      animation: msgSlideIn 0.3s ease-out;
    }
    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Drag over state for body */
    body.drag-over::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(59, 130, 246, 0.08);
      border: 3px dashed #3b82f6;
      border-radius: 0;
      z-index: 9999;
      pointer-events: none;
    }
    /* Custom scrollbar */
    #chat-area::-webkit-scrollbar { width: 6px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    #chat-area::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  </style>
</head>
<body class="h-screen bg-gray-50 flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 flex-shrink-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div>
        <h1 class="text-base font-semibold text-gray-900 leading-tight">图片文字提取</h1>
        <p class="text-xs text-gray-400">纯前端 OCR · 隐私安全</p>
      </div>
      <button id="pwa-install-btn" style="display:none" class="p-2 rounded-lg hover:bg-black/5 transition-colors" title="添加到主屏幕"><svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m-8-8h16M12 4l-4 4m4-4l4 4"/></svg></button>
    </div>
  </header>

  <!-- Chat Area -->
  <main id="chat-area" class="flex-1 overflow-y-auto">
    <div id="messages" class="max-w-3xl mx-auto px-4 py-6 space-y-4">
      <!-- Messages will be inserted here by JS -->
    </div>
  </main>

  <!-- Bottom Input Area -->
  <footer class="bg-white border-t border-gray-200 flex-shrink-0">
    <div class="max-w-3xl mx-auto px-4 py-3">
      <label id="upload-area" class="flex flex-col items-center justify-center gap-2 py-4 px-4 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-colors group">
        <svg class="w-6 h-6 text-gray-400 group-hover:text-blue-500 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span class="text-sm text-gray-500 group-hover:text-blue-600 transition-colors">点击或拖拽上传图片</span>
        <span class="text-xs text-gray-400">支持 JPG / PNG / BMP / WebP，也可 Ctrl+V 粘贴</span>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/bmp,image/webp" class="hidden" />
      </label>
      <!-- Language selector (inline, subtle) -->
      <div class="flex items-center justify-center gap-2 mt-2">
        <span class="text-xs text-gray-400">识别语言：</span>
        <select id="lang-select" class="text-xs text-gray-500 border border-gray-200 rounded px-2 py-1 bg-white focus:ring-1 focus:ring-blue-400 focus:border-blue-400 outline-none">
          <option value="chi_sim+eng">中文 + 英文</option>
          <option value="eng">英文</option>
          <option value="chi_tra+eng">中文繁体 + 英文</option>
        </select>
      </div>
    </div>
  </footer>

  <!-- Main Script -->
  <script>
    const chatArea = document.getElementById('chat-area');
    const messagesEl = document.getElementById('messages');
    const uploadArea = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');
    const langSelect = document.getElementById('lang-select');

    // ===== Message helpers =====
    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
      });
    }

    function createUserMessage(imageUrl) {
      const div = document.createElement('div');
      div.className = 'flex justify-end msg-appear';
      div.innerHTML = `
        <div class="max-w-[75%] sm:max-w-[60%]">
          <div class="bg-blue-600 rounded-2xl rounded-br-sm p-1 shadow-sm">
            <img src="${imageUrl}" alt="上传的图片" class="max-h-48 rounded-xl object-contain" />
          </div>
          <p class="text-xs text-gray-400 text-right mt-1 pr-1">刚刚</p>
        </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function createTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-appear';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
          <div class="flex items-center gap-2">
            <div class="flex gap-1">
              <span class="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
              <span class="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
              <span class="typing-dot w-2 h-2 bg-gray-400 rounded-full inline-block"></span>
            </div>
            <span class="text-sm text-gray-500" id="typing-status">正在识别中...</span>
          </div>
          <div class="mt-2 w-48 bg-gray-200 rounded-full h-1.5">
            <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
          </div>
          <p id="progress-status" class="text-xs text-gray-400 mt-1">准备中...</p>
        </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function formatText(text) {
      // Preserve line breaks, convert to <br>, handle multiple newlines as paragraph breaks
      let escaped = escapeHtml(text);
      // Convert double newlines to paragraph breaks
      escaped = escaped.replace(/\n{2,}/g, '<br><br>');
      // Convert single newlines to <br>
      escaped = escaped.replace(/\n/g, '<br>');
      return escaped;
    }

    function createResultMessage(text) {
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-appear';
      const formattedText = formatText(text);
      const copyId = 'copy-' + Date.now();
      div.innerHTML = `
        <div class="max-w-[85%] sm:max-w-[75%]">
          <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
            <p class="text-xs text-gray-400 mb-2">📝 识别结果</p>
            <div class="text-sm text-gray-800 leading-relaxed break-words whitespace-pre-wrap">${formattedText}</div>
            <div class="mt-3 pt-2 border-t border-gray-100 flex items-center gap-2">
              <button onclick="copyResult(this, '${copyId}')" class="flex items-center gap-1 text-xs text-blue-600 hover:text-blue-800 cursor-pointer transition-colors">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                复制文字
              </button>
              <span class="copy-toast text-xs text-green-600 hidden">已复制 ✓</span>
            </div>
          </div>
          <p class="text-xs text-gray-400 mt-1 pl-1">刚刚</p>
        </div>`;
      // Store raw text for copying
      div.dataset.rawText = text;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function createErrorMessage(msg) {
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-appear';
      div.innerHTML = `
        <div class="bg-red-50 border border-red-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm max-w-[80%]">
          <p class="text-sm text-red-600">❌ ${escapeHtml(msg)}</p>
        </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function addSystemTextMessage(text) {
      const div = document.createElement('div');
      div.className = 'flex justify-start msg-appear';
      div.innerHTML = `
        <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm max-w-[85%] sm:max-w-[75%]">
          <p class="text-sm text-gray-700 leading-relaxed">${text}</p>
        </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    // ===== Copy function =====
    function copyResult(btn, id) {
      const msgDiv = btn.closest('[data-raw-text]');
      const text = msgDiv?.dataset?.rawText || '';
      const toast = btn.parentElement.querySelector('.copy-toast');
      if (!text) return;

      navigator.clipboard.writeText(text).then(() => {
        if (toast) {
          toast.classList.remove('hidden');
          setTimeout(() => toast.classList.add('hidden'), 2000);
        }
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        if (toast) {
          toast.classList.remove('hidden');
          setTimeout(() => toast.classList.add('hidden'), 2000);
        }
      });
    }

    // ===== OCR Processing =====
    async function processImage(file) {
      // Show user message with image
      const imageUrl = URL.createObjectURL(file);
      createUserMessage(imageUrl);

      // Show typing indicator
      const typingEl = createTypingIndicator();
      const progressBar = typingEl.querySelector('#progress-bar');
      const progressStatus = typingEl.querySelector('#progress-status');
      const typingStatus = typingEl.querySelector('#typing-status');

      const lang = langSelect.value;

      try {
        const result = await Tesseract.recognize(file, lang, {
          logger: (m) => {
            if (m.status === 'loading tesseract core') {
              progressStatus.textContent = '加载识别引擎...';
              typingStatus.textContent = '加载引擎中...';
            } else if (m.status === 'initializing tesseract') {
              progressStatus.textContent = '初始化引擎...';
            } else if (m.status === 'loading language traineddata') {
              progressStatus.textContent = '下载语言数据...';
              typingStatus.textContent = '下载数据中...';
            } else if (m.status === 'initializing api') {
              progressStatus.textContent = '准备识别...';
            } else if (m.status === 'recognizing text') {
              progressStatus.textContent = '正在识别文字...';
              typingStatus.textContent = '识别中...';
            }
            if (m.progress) {
              const pct = Math.round(m.progress * 100);
              progressBar.style.width = pct + '%';
            }
          },
        });

        // Remove typing indicator
        typingEl.remove();

        const text = result.data.text.trim();
        if (text) {
          createResultMessage(text);
        } else {
          createErrorMessage('未识别到文字内容，请尝试更清晰的图片。');
        }
      } catch (err) {
        console.error('OCR Error:', err);
        typingEl.remove();
        createErrorMessage('识别失败，请重试。' + (err.message ? ' (' + err.message + ')' : ''));
      }
    }

    // ===== File handling =====
    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) {
        createErrorMessage('请上传图片文件（JPG / PNG / BMP / WebP）。');
        return;
      }
      if (file.size > 20 * 1024 * 1024) {
        createErrorMessage('图片大小超过 20MB，请使用较小的图片。');
        return;
      }
      processImage(file);
      // Reset file input
      fileInput.value = '';
    }

    // ===== Event listeners =====
    // Click to upload
    uploadArea.addEventListener('click', (e) => {
      // Don't trigger if clicking on the select
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'OPTION') return;
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) handleFile(file);
    });

    // Drag and drop on entire body
    document.body.addEventListener('dragover', (e) => {
      e.preventDefault();
      document.body.classList.add('drag-over');
    });

    document.body.addEventListener('dragleave', (e) => {
      if (e.relatedTarget === null || !document.body.contains(e.relatedTarget)) {
        document.body.classList.remove('drag-over');
      }
    });

    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      document.body.classList.remove('drag-over');
      const file = e.dataTransfer?.files[0];
      if (file) handleFile(file);
    });

    // Paste
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) handleFile(file);
          break;
        }
      }
    });

    // ===== Welcome message =====
    (function init() {
      addSystemTextMessage('你好！我是图片文字提取助手 📷<br><br>上传一张图片，我来帮你提取文字。<br>支持 <strong>中英文</strong> 识别，所有处理都在你的浏览器本地完成，保护隐私。');
    })();
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
<script>
(function(){
  let deferredPrompt;
  const installBtn = document.getElementById('pwa-install-btn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.style.display = 'flex';
  });
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    });
  }
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    if (installBtn) installBtn.style.display = 'none';
  }
})();
</script>
</body>
</html>
